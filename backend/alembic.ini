# Alembic configuration file.
# This file is used by Flask-Migrate (which wraps Alembic).
# Run migrations via:
#   flask db init      (first time only - already done)
#   flask db migrate -m "description"
#   flask db upgrade

[alembic]
script_location = migrations

# Default for local CLI; migrations/env.py overrides with DATABASE_URL when set.
sqlalchemy.url = sqlite:///cycleiq_dev.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
