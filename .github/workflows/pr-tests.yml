name: PR Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements-test.txt"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r requirements-test.txt

      - name: Run backend tests with coverage
        run: PYTHONPATH=. pytest tests/ -v --tb=short --cov=cycleiq --cov-report=term-missing

  web-tests:
    name: web-tests (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for web app
        id: check-web
        run: |
          if [ -f apps/web/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No apps/web/package.json found -- skipping web checks."
          fi

      - name: Set up Node.js
        if: steps.check-web.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        if: steps.check-web.outputs.exists == 'true'
        run: npm ci --prefix apps/web

      - name: Lint web
        if: steps.check-web.outputs.exists == 'true'
        run: npm run lint --prefix apps/web

      - name: Build web
        if: steps.check-web.outputs.exists == 'true'
        run: npm run build --prefix apps/web

      - name: Run web tests
        if: steps.check-web.outputs.exists == 'true'
        run: npm test --prefix apps/web -- --passWithNoTests
