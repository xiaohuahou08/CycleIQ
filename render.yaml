# render.yaml — Render Blueprint for CycleIQ Backend
# Connects to Render PostgreSQL and syncs to GitHub for auto-deploy
services:
  - type: web
    name: cycleiq-api
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cycleiq-db
          property: connectionString
      - key: FLASK_ENV
        value: production

databases:
  - name: cycleiq-db
    plan: free
    region: oregon
