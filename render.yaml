# render.yaml — Render Blueprint for CycleIQ Backend
# Uses Supabase PostgreSQL (no Render-managed database needed)
services:
  - type: web
    name: cycleiq-api
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    # Run Alembic migrations before every deploy.
    # If the migration fails the deploy is aborted and the old version keeps running.
    preDeployCommand: "cd /app/backend && flask db upgrade"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: FLASK_APP
        value: app
      # --- Secrets: set these manually in the Render Dashboard ---
      # Supabase → Settings → Database → Connection string (port 5432, direct)
      - key: DATABASE_URL
        sync: false
      # Supabase → Settings → API → Project URL
      - key: SUPABASE_URL
        sync: false
      # Supabase → Settings → API → anon public key
      - key: SUPABASE_ANON_KEY
        sync: false
      # Supabase → Settings → API → service_role key (keep secret)
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Supabase → Settings → API → JWT Settings → JWT Secret
      - key: SUPABASE_JWT_SECRET
        sync: false
